[env]
TERM = "xterm-256color"

[font]
normal = { family = "JetBrainsMonoNL Nerd Font" }
bold = { family = "JetBrainsMonoNL Nerd Font" }
italic = { family = "JetBrainsMonoNL Nerd Font" }
size = 12

[window]
padding.x = 14
padding.y = 14
decorations = "None"

[terminal.shell]
program = "/usr/bin/fish"
args = ["--login", "-c", "source ~/.config/fish/config.fish; exec fish"]

[keyboard]
bindings = [
  { key = "F11", action = "ToggleFullscreen" },
  { key = "Insert", mods = "Shift", action = "Paste" },
  { key = "Insert", mods = "Control", action = "Copy" }
]

[terminal]
osc52 = "CopyPaste"

# --- Gruberdark Colors ---
[colors]
[colors.primary]
background = "#181818"
foreground = "#bcb7b0"

[colors.cursor]
text = "#221F20"
cursor = "#bcb7b0"

[colors.vi_mode_cursor]
text = "#221F20"
cursor = "#bcb7b0"

[colors.search.matches]
foreground = "#221F20"
background = "#bcb7b0"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#5f5448"
background = "#bcb7b0"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

[colors.normal]
black = "#221F20"
red = "#b27575"
green = "#80b780"
yellow = "#bdbd89"
blue = "#9393c3"
magenta = "#ae6fae"
cyan = "#7cb6b6"
white = "#D3B580"

[colors.bright]
black = "#5f5448"
red = "#d5aeae"
green = "#b9dab9"
yellow = "#dfdfc3"
blue = "#cdcde5"
magenta = "#c482c4"
cyan = "#90cbcb"
white = "#bcb7b0"

[colors.dim]
black = "#bcb7b0"
red = "#d5aeae"
green = "#b9dab9"
yellow = "#dfdfc3"
blue = "#cdcde5"
magenta = "#c482c4"
cyan = "#90cbcb"
white = "#5f5448"

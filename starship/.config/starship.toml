add_newline = true
command_timeout = 200
format = """
[┌──(](bold blue)$username[㉿](bold blue)$hostname[)-](bold blue)$directory$git_branch$git_status$custom
$character"""

[character]
success_symbol = "[└─$ ](bold blue)"
error_symbol = "[└─$ ](bold red)"

[username]
show_always = true
format = "[$user](bold red)"

[hostname]
ssh_only = false
format = "[$hostname](bold red)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
style = "bold cyan"
format = "[\[](bold blue)[$path]($style)[\]](bold blue) "

[git_branch]
format = "[-[](bold blue)[$branch]($style)[\]](bold blue) "
style = "italic cyan"

[git_status]
format     = '[$all_status]($style)'
style      = "cyan"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

[custom.network_ip]
description = "Display active network interface and local IP address"
command = '''
route_info=$(ip route get 1.1.1.1 2>/dev/null)
interface=$(echo "$route_info" | grep -oP 'dev \K\S+')
ip=$(echo "$route_info" | grep -oP 'src \K[\d.]+')

if [ -n "$interface" ] && [ -n "$ip" ]; then
  echo "$interface:$ip"
else
  # Offline fallback: find first non-loopback interface with an IPv4 address
  interface=$(ip -4 -o addr show | grep -v ' lo ' | awk '{print $2}' | head -n 1)
  ip=$(ip -4 -o addr show | grep -v ' lo ' | awk '{print $4}' | cut -d/ -f1 | head -n 1)
  if [ -n "$interface" ] && [ -n "$ip" ]; then
    echo "$interface:$ip"
  fi
fi
'''
when = "true"
style = "bold red"
format = "[-[](bold blue)[$output]($style)[\]](bold blue) "

